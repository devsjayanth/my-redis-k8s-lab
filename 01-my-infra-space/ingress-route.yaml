# Ingress defines Layer 7 routing for external access via myredislab.dev.
# Placed in my-infra-space to centralize all external entry points.
# The NGINX ingress controller watches this namespace for routing rules
# and forwards matched requests to backend services in other namespaces.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: redisinsight-ui-ingress
  namespace: my-infra-space
  labels:
    project: my-redis-k8s-lab
spec:
  ingressClassName: nginx
  rules:
  - host: myredislab.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            # Cross-namespace backend reference requires the service
            # to be reachable via DNS. The FQDN is resolved by the
            # ingress controller at runtime.
            name: redisinsight-ui.my-app-space.svc.cluster.local
            port:
              number: 80