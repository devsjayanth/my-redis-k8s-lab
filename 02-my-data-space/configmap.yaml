# Redis server configuration externalized from the container image.
# Mounted as a file at /etc/redis/redis.conf inside the pod.
# Changes require a StatefulSet rollout restart to take effect.
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: my-data-space
  labels:
    project: my-redis-k8s-lab
data:
  redis.conf: |
    bind 0.0.0.0
    protected-mode yes
    port 6379
    appendonly yes
    appendfilename "appendonly.aof"
    save 900 1
    save 300 10
    save 60 10000
    maxmemory-policy allkeys-lru
    tcp-backlog 511
    timeout 0
    tcp-keepalive 300