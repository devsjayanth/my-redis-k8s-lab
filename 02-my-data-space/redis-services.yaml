# Headless service disables kube-proxy load balancing and causes
# CoreDNS to return individual pod A records. Required for
# StatefulSet per-pod DNS resolution.
apiVersion: v1
kind: Service
metadata:
  name: redis-db-headless
  namespace: my-data-space
  labels:
    project: my-redis-k8s-lab
spec:
  clusterIP: None
  selector:
    app: redis-db
  ports:
  - port: 6379
    targetPort: 6379
---
# ClusterIP service provides a single stable virtual IP for
# clients that do not need per-pod addressing. Distributes
# connections across all ready Redis pods via kube-proxy.
apiVersion: v1
kind: Service
metadata:
  name: redis-db
  namespace: my-data-space
  labels:
    project: my-redis-k8s-lab
spec:
  type: ClusterIP
  selector:
    app: redis-db
  ports:
  - port: 6379
    targetPort: 6379