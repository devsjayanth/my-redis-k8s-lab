# Credentials for Redis authentication. stringData accepts plain text;
# Kubernetes encodes to base64 automatically at creation time.
# This secret must be manually synced to my-app-space because
# Kubernetes does not support cross-namespace secret references.
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
  namespace: my-data-space
  labels:
    project: my-redis-k8s-lab
type: Opaque
stringData:
  password: "SuperSecretRedis2026!"
  username: "default"