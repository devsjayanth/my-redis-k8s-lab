# Application-level configuration for RedisInsight.
# Separated from the data-tier ConfigMap to maintain namespace
# boundaries and allow independent updates without touching Redis.
apiVersion: v1
kind: ConfigMap
metadata:
  name: redisinsight-config
  namespace: my-app-space
  labels:
    project: my-redis-k8s-lab
data:
  RI_REDIS_NAME: "K8s Redis Lab"
  RI_REDIS_PORT: "6379"
  # Cross-namespace FQDN to reach Redis in my-data-space.
  RI_REDIS_HOST: "redis-db.my-data-space.svc.cluster.local"