# ClusterIP service exposes RedisInsight internally on port 80,
# forwarding to container port 5540. The ingress controller in
# my-infra-space targets this service for external routing.
apiVersion: v1
kind: Service
metadata:
  name: redisinsight-ui
  namespace: my-app-space
  labels:
    project: my-redis-k8s-lab
spec:
  type: ClusterIP
  selector:
    app: redisinsight-ui
  ports:
  - port: 80
    targetPort: 5540