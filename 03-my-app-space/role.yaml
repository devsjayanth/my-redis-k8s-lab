# Namespace-scoped read-only permissions. Grants ability to discover
# pods, services, and endpoints within my-app-space only. Cannot
# create, update, delete, or access resources outside this namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: redisinsight-reader
  namespace: my-app-space
  labels:
    project: my-redis-k8s-lab
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints"]
  verbs: ["get", "list", "watch"]