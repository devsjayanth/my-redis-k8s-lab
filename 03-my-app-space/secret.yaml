# Duplicate of redis-credentials from my-data-space.
# Kubernetes prohibits cross-namespace secret references by design.
# Sync this whenever the source secret changes using:
#   kubectl get secret redis-credentials -n my-data-space -o yaml | \
#     sed 's/namespace: my-data-space/namespace: my-app-space/' | \
#     kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
  namespace: my-app-space
  labels:
    project: my-redis-k8s-lab
type: Opaque
stringData:
  password: "SuperSecretRedis2026!"
  username: "default"